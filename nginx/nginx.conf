user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ── upstream is defined in conf.d/upstream.conf ──────────────
    # Ansible swaps that file and sends: docker exec nginx nginx -s reload
    include /etc/nginx/conf.d/*.conf;

    server {
        listen 80;
        server_name _;

        # Main traffic routed to active upstream (blue or green)
        location / {
            proxy_pass         http://app_upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
        }

        # Nginx health check (always 200, used to verify proxy is alive)
        location /nginx-health {
            return 200 '{"status":"ok","proxy":"nginx"}\n';
            add_header Content-Type application/json;
        }
    }
}
