# ─────────────────────────────────────────────────────────
#  Shared variables for all Ansible roles
# ─────────────────────────────────────────────────────────

# Absolute path to the project root on the control machine.
# Uses Ansible's built-in playbook_dir magic variable (the ansible/ directory)
# and walks one level up. Override at runtime: -e project_root=/your/path
project_root: "{{ playbook_dir | dirname }}"


# Upstream config file that Ansible writes (volume-mounted into Nginx)
nginx_upstream_conf: "{{ project_root }}/nginx/conf.d/upstream.conf"

# Direct host ports for pre-switch health verification (bypasses Nginx)
blue_health_url:  "http://localhost:8105/health"
green_health_url: "http://localhost:8205/health"

# Nginx gateway URL (through the proxy)
gateway_url: "http://localhost/health"

# Health gate thresholds
# 3 retries × 2s delay = 6s worst-case gate time (down from 6×5=30s).
# Safe because STEP 2 already confirmed green is healthy before nginx switches.
# The gate is a post-switch sanity check, not the primary readiness mechanism.
health_gate_retries:      3     # number of poll attempts after switchover
health_gate_delay:        2     # seconds between attempts
health_gate_fail_status:  503   # HTTP status considered a failure

# Rollback log location
rollback_log: "{{ project_root }}/rollback.log"
